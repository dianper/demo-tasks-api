name: AI Agent Trigger

# Fires when a label is added to an issue.
# If the label is "ai", assigns GitHub Copilot to the issue
# so the Copilot Coding Agent picks it up automatically.

on:
  issues:
    types: [labeled]

jobs:
  trigger-agent:
    name: Assign Copilot Agent
    runs-on: ubuntu-latest

    # Only run when the label added is exactly "ai"
    if: github.event.label.name == 'ai'

    permissions:
      issues: write

    steps:
      - name: Confirm trigger
        run: |
          echo "Issue #${{ github.event.issue.number }} labeled with 'ai'"
          echo "Title: ${{ github.event.issue.title }}"

      - name: Assign Copilot to issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Assign the GitHub Copilot agent to the issue.
            // This is what wakes up the Copilot Coding Agent.
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['copilot']
            });

            // Post a comment so engineers know the agent is working
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🤖 **Copilot Agent activated.**',
                '',
                'The agent will now:',
                '1. Read this issue and the project context in `.github/copilot-instructions.md`',
                '2. Create a branch and implement the feature',
                '3. Write unit and integration tests',
                '4. Open a Pull Request for human review',
                '',
                '_A human engineer must approve the PR before anything merges._'
              ].join('\n')
            });