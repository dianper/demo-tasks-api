name: 🤖 AI Agent Trigger

# Fires when a label is added to an issue.
# If the label is "ai", assigns the Copilot Coding Agent via REST API.
#
# IMPORTANT — the correct assignee handle is "copilot-swe-agent[bot]", NOT "copilot".
# Requires a PAT (GH_AGENT_PAT) with read/write on:
#   actions, contents, issues, pull requests

on:
  issues:
    types: [labeled]

jobs:
  trigger-agent:
    name: Assign Copilot Agent
    runs-on: ubuntu-latest

    if: github.event.label.name == 'ai'

    permissions:
      issues: write

    steps:
      - name: Confirm trigger
        run: |
          echo "Issue #${{ github.event.issue.number }} labeled with 'ai'"
          echo "Title: ${{ github.event.issue.title }}"

      - name: Assign copilot-swe-agent via REST API
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_PAT }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/assignees \
            -f 'assignees[]=copilot-swe-agent[bot]'

      - name: Post confirmation comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🤖 **Copilot Agent assigned and activated.**',
                '',
                'The agent will now:',
                '1. Read this issue and `.github/copilot-instructions.md`',
                '2. Create a branch and implement the feature',
                '3. Write unit and integration tests',
                '4. Open a Pull Request for human review',
                '',
                '_A human engineer must approve the PR before anything merges._'
              ].join('\n')
            });