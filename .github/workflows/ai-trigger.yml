name: AI Agent Trigger

# Fires when a label is added to an issue.
# If the label is "ai", assigns the Copilot Coding Agent to the issue.
#
# NOTE: addAssignees('copilot') requires a PAT from a user with
# an active Copilot Pro+ license — GITHUB_TOKEN does not have
# permission to assign AI agents.

on:
  issues:
    types: [labeled]

jobs:
  trigger-agent:
    name: Assign Copilot Agent
    runs-on: ubuntu-latest

    # Only run when the label added is exactly "ai"
    if: github.event.label.name == 'ai'

    permissions:
      issues: write

    steps:
      - name: Confirm trigger
        run: |
          echo "Issue #${{ github.event.issue.number }} labeled with 'ai'"
          echo "Title: ${{ github.event.issue.title }}"

      - name: Assign Copilot agent via PAT
        uses: actions/github-script@v7
        with:
          # GITHUB_TOKEN cannot assign AI agents — use a fine-grained PAT
          # from a user with an active Copilot Pro+ license.
          # Setup: repo → Settings → Secrets → Actions → GH_AGENT_PAT
          github-token: ${{ secrets.GH_AGENT_PAT }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['copilot']
            });

      - name: Post confirmation comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🤖 **Copilot Agent assigned and activated.**',
                '',
                'The agent will now:',
                '1. Read this issue and `.github/copilot-instructions.md`',
                '2. Create a branch and implement the feature',
                '3. Write unit and integration tests',
                '4. Open a Pull Request for human review',
                '',
                '_A human engineer must approve the PR before anything merges._'
              ].join('\n')
            });